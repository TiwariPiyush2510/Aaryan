<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AARYAN TIWARI - Singer, Composer, Lyricist, Performer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: #1a1a1a;
            color: #fff;
            overflow-x: hidden;
        }

        /* Header/Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(218, 165, 32, 0.2);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #DAA520;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            color: #DAA520;
        }

        /* Mobile menu toggle */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: #DAA520;
            transition: 0.3s;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background Image - FIXED FOR MOBILE */
        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* Overlay - REDUCED OPACITY FOR BETTER VISIBILITY */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(26, 26, 26, 0.3) 0%,
                rgba(26, 26, 26, 0.5) 50%,
                rgba(26, 26, 26, 0.7) 100%
            );
            z-index: 2;
        }

        /* Hero Content */
        .hero-content {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 2rem;
            max-width: 900px;
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: bold;
            color: #DAA520;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            line-height: 1.2;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: #fff;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        .hero-tagline {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: #e0e0e0;
            margin-bottom: 1rem;
            font-style: italic;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        .hero-description {
            font-size: clamp(0.95rem, 2.2vw, 1.2rem);
            color: #d0d0d0;
            margin-bottom: 2.5rem;
            letter-spacing: 0.03em;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        /* CTA Buttons */
        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .btn-primary {
            background: #DAA520;
            color: #1a1a1a;
        }

        .btn-primary:hover {
            background: #FFD700;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(218, 165, 32, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
        }

        .btn-secondary:hover {
            background: #fff;
            color: #1a1a1a;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.3);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 1rem;
            }

            .logo {
                font-size: 1.2rem;
            }

            .nav-links {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 70px);
                background: rgba(26, 26, 26, 0.98);
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding-top: 3rem;
                gap: 2.5rem;
                transition: left 0.3s;
            }

            .nav-links.active {
                left: 0;
            }

            .nav-links a {
                font-size: 1.3rem;
            }

            .menu-toggle {
                display: flex;
            }

            /* CRITICAL: Better mobile image display */
            .hero-image img {
                object-position: center 30%;
            }

            /* CRITICAL: Lighter overlay on mobile */
            .hero-overlay {
                background: linear-gradient(
                    to bottom,
                    rgba(26, 26, 26, 0.2) 0%,
                    rgba(26, 26, 26, 0.4) 50%,
                    rgba(26, 26, 26, 0.6) 100%
                );
            }

            .hero-content {
                padding: 1.5rem;
            }

            .cta-buttons {
                flex-direction: column;
                gap: 1rem;
                width: 100%;
                max-width: 300px;
                margin: 0 auto;
            }

            .btn {
                width: 100%;
                padding: 1rem 2rem;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                letter-spacing: 0.05em;
            }

            /* Even lighter on very small screens */
            .hero-overlay {
                background: linear-gradient(
                    to bottom,
                    rgba(26, 26, 26, 0.15) 0%,
                    rgba(26, 26, 26, 0.35) 50%,
                    rgba(26, 26, 26, 0.55) 100%
                );
            }
        }

        /* Extra small devices */
        @media (max-width: 360px) {
            .logo {
                font-size: 1rem;
                letter-spacing: 1px;
            }

            nav {
                padding: 0.75rem;
            }
        }

        /* Landscape mobile fix */
        @media (max-height: 500px) and (orientation: landscape) {
            .hero {
                height: auto;
                min-height: 100vh;
                padding: 80px 0 40px;
            }

            .hero-content {
                padding: 2rem 1rem;
            }

            .cta-buttons {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo">AARYAN TIWARI</div>
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#latest">Latest</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#videos">Videos</a></li>
            <li><a href="#music">Music</a></li>
            <li><a href="#gallery">Gallery</a></li>
            <li><a href="#live">Live</a></li>
            <li><a href="#connect">Connect</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <!-- Background Image -->
        <div class="hero-image">
            <img src="/mnt/user-data/uploads/1772475023574_image.png" alt="Aaryan Tiwari performing">
        </div>

        <!-- Overlay -->
        <div class="hero-overlay"></div>

        <!-- Content -->
        <div class="hero-content">
            <h1 class="hero-title">AARYAN TIWARI</h1>
            <p class="hero-subtitle">Singer · Composer · Lyricist · Performer</p>
            <p class="hero-tagline">"An IITian Turned Musician"</p>
            <p class="hero-description">IIT Roorkee | Harvard | Mumbai-based Artist</p>
            
            <div class="cta-buttons">
                <a href="#latest" class="btn btn-primary">Latest Release</a>
                <a href="#connect" class="btn btn-secondary">Get in Touch</a>
            </div>
        </div>
    </section>

    <script>
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.classList.toggle('active');
        }

        // Close menu when clicking on a link
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('navLinks').classList.remove('active');
            });
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            const nav = document.querySelector('nav');
            const navLinks = document.getElementById('navLinks');
            if (!nav.contains(e.target)) {
                navLinks.classList.remove('active');
            }
        });
    </script>
</body>
</html>
